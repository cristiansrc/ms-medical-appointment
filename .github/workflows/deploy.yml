name: CI/CD Pipeline - Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'corretto'
        java-version: '21'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    # 1. Ejecuta primero las pruebas unitarias
    - name: Run Unit Tests
      run: ./gradlew test

    # 2. Compila el JAR ejecutable (solo si las pruebas pasaron)
    - name: Build with Gradle
      run: ./gradlew bootJar

    # 3. Prepara el paquete para Elastic Beanstalk
    - name: Generate Deployment Package
      run: |
        mkdir -p deploy
        cp build/libs/*.jar deploy/application.jar

    # 4. Despliega a AWS Elastic Beanstalk
    - name: Deploy to AWS Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v22
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: 'ms-medical-appointment'
        environment_name: 'Ms-medical-appointment-env'
        version_label: 'build-${{ github.run_number }}'
        region: 'us-east-2'
        deployment_package: deploy/application.jar
